[workspace]

[package]
name = "maze-oracle"
version = "0.0.0"
edition = "2021"
publish = false

[[bin]]
name = "maze-oracle"
path = "src/main.rs"

[dependencies]
anyhow = "1"
blake3 = "1"
reqwest = { version = "0.12", default-features = false, features = ["json", "rustls-tls", "http2", "charset"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tokio = { version = "1", features = ["rt-multi-thread", "macros"] }

[profile.release]
strip = true
lto = "thin"
codegen-units = 1
