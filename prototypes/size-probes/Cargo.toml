# Footprint probes for candidate engines and libraries. Each feature links one candidate so a
# release+stripped build reveals its binary cost, grounded against `baseline`. Detached from the
# parent workspace via the empty [workspace] table so it builds on its own and never affects `just ci`.
#
# Build one at a time, e.g.:
#   cargo build --release --no-default-features --features baseline
#   cargo build --release --no-default-features --features cel
#   cargo build --release --no-default-features --features croner
# or run ./compare-all-size.sh for grouped results across every built-in probe.
#
# Dependency versions and the minimal usage in main.rs are probe inputs. If an upstream API changes,
# update the matching cfg block so the selected crate is actually linked.
[workspace]

[package]
name = "size-probes"
version = "0.0.0"
edition = "2021"
publish = false

[[bin]]
name = "probe"
path = "main.rs"

[features]
baseline = []
tokio_runtime = ["dep:tokio"]
loom_tls_baseline = ["dep:tokio", "dep:rustls-loom-aws", "dep:tokio-rustls"]
inference_http_baseline = ["dep:tokio", "dep:reqwest-rustls", "dep:rustls-loom-aws", "dep:tokio-rustls"]
# L1 guard / L2 derivation engine candidates.
cel = ["dep:cel-interpreter"]
regorus = ["dep:regorus"]
ascent = ["dep:ascent"]
cozo = ["dep:cozo"]
# Cron-expression parser candidates (events/triggers exploration). Host-side; pick ONE.
cron = ["dep:cron", "dep:chrono"]
croner = ["dep:croner", "dep:chrono"]
saffron = ["dep:saffron", "dep:chrono"]
# Calendar (0037) parse/recurrence candidates: iCalendar parse/serialize and RRULE expansion.
ical = ["dep:icalendar"]
rrule = ["dep:rrule"]
ical_rrule = ["dep:icalendar", "dep:rrule"]
# Civil-time substrate for a hand-built RRULE engine (no embedded tz database): the `time` crate doing
# proleptic-Gregorian date math. Proves the "build our own" footprint floor (measures == baseline).
civil_time = ["dep:time"]
# Loom Templates parser/runtime candidates. Host-side processor, Jinja-family syntax preferred.
minijinja_default = ["dep:minijinja"]
minijinja_minimal = ["dep:minijinja-minimal"]
tera_template = ["dep:tera"]
upon_template = ["dep:upon"]
handlebars_template = ["dep:handlebars", "dep:serde_json"]
rustls_default = ["dep:rustls"]
rustls_ring = ["dep:rustls-ring"]
rustls_aws = ["dep:rustls-aws"]
rustls_aws_fips = ["dep:rustls-aws-fips"]
rustls_pki_types = ["dep:rustls-pki-types"]
rustls_webpki = ["dep:rustls-webpki", "dep:rustls-pki-types"]
x509_parser = ["dep:x509-parser"]
x509_cert = ["dep:x509-cert"]
rcgen_self_signed = ["dep:rcgen"]
rcgen_ed25519 = ["dep:rcgen"]
grpc_tonic = ["dep:tonic", "dep:prost"]
oidc_openidconnect_default = ["dep:openidconnect"]
oidc_openidconnect_core = ["dep:openidconnect-core"]
oidc_id_token_verifier = ["dep:id_token_verifier"]
oidc_jsonwebtoken_default = ["dep:jsonwebtoken"]
oidc_jsonwebtoken_aws = ["dep:jsonwebtoken-aws"]
saml_alpha = ["dep:saml"]
saml_rustauth = ["dep:rustauth-saml"]
saml_rustauth_signed = ["dep:rustauth-saml-signed"]
saml_opensaml = ["dep:opensaml"]
saml_opensaml_protocol = ["dep:opensaml-protocol"]
webauthn_rp = ["dep:webauthn_rp"]
webauthn_caden = ["dep:caden"]
webauthn_passkey = ["dep:passkey"]
webauthn_rs = ["dep:webauthn-rs", "dep:url"]
x509_parser_verify_ring = ["dep:x509-parser-verify-ring"]
x509_parser_verify_aws = ["dep:x509-parser-verify-aws"]
x509_verify_default = ["dep:x509-verify"]
public_key_ring = ["dep:ring"]
public_key_ed25519_dalek = ["dep:ed25519-dalek", "dep:ed25519-signature"]
public_key_p256 = ["dep:p256"]
public_key_rsa = ["dep:rsa"]
# Hugging Face model acquisition candidates for 0062.
hf_hub_default = ["dep:hf-hub-default"]
hf_hub_tokio_rustls = ["dep:hf-hub-tokio-rustls"]
hf_hub_ureq = ["dep:hf-hub-ureq"]
reqwest_rustls_blocking = ["dep:reqwest-rustls-blocking"]
# Inference runtime/client candidates for 0062 runtime adapter decisions.
genai_rustls = ["dep:genai-probe"]
ollama_rs_rustls = ["dep:ollama-rs-rustls"]
ollama_rs_stream = ["dep:ollama-rs-stream"]
llama_cpp_2_common = ["dep:llama-cpp-2-common"]
llama_cpp_2_metal = ["dep:llama-cpp-2-metal"]
mistralrs_default = ["dep:mistralrs-probe"]
apple_mlx = ["dep:apple-mlx-probe"]
llmfit_core = ["dep:llmfit-core-probe"]
# Hardware/system probing candidates for inference doctor.
hardware_sysinfo = ["dep:sysinfo"]
hardware_systemstat = ["dep:systemstat"]
hardware_sys_info = ["dep:sys-info-probe"]
# IPFS and Tor candidates. These are intentionally separate: IPFS peer retrieval is not a
# prerequisite for Tor-routed listeners or onion services.
ipfs_rust_node = ["dep:tokio", "dep:rust-ipfs"]
tor_arti_onion = ["dep:arti-client"]

[dependencies]
# Versions are "*" so resolution always picks the latest published release - a wrong pin on any one
# optional dep would break the whole lockfile (and thus every probe, including baseline). Only the
# activated feature's dep is compiled, so a non-activated dep never affects another probe's build.
# L1 guard candidates.
cel-interpreter = { version = "*", optional = true }
regorus = { version = "*", optional = true }
# L2 derivation candidates. ascent is a compile-time macro (expect ~zero runtime footprint).
ascent = { version = "*", optional = true }
# cozo is a full DB; its default build may pull a C++ storage backend (RocksDB) and be slow/heavy.
# Only built under `--features cozo`; if it fails, that probe is reported FAILED and the rest continue.
cozo = { version = "*", optional = true }
# Cron parsers. `cron` and `croner` evaluate against chrono DateTimes; `saffron` exposes its own
# iterator but is commonly driven from chrono. chrono is shared so the comparison reflects each
# parser's marginal cost over the same time library.
cron = { version = "*", optional = true }
croner = { version = "*", optional = true }
saffron = { version = "*", optional = true }
chrono = { version = "*", optional = true, default-features = false, features = ["clock"] }
# Calendar (0037): icalendar parses/builds RFC 5545 objects; rrule expands RECURRENCE rules. Measured
# both alone and together (ical_rrule) since the facet links both.
icalendar = { version = "*", optional = true }
rrule = { version = "*", optional = true }
# Lean civil-time math (no tz database) for a hand-built RRULE engine.
time = { version = "*", optional = true, default-features = false, features = ["std"] }
# Loom Templates candidates. MiniJinja is measured twice: published defaults and a smaller profile
# close to what the wrapper crate would expose at first.
minijinja = { version = "2.21.0", optional = true }
minijinja-minimal = { package = "minijinja", version = "2.21.0", optional = true, default-features = false, features = ["builtins", "macros", "multi_template", "std_collections", "serde"] }
tera = { version = "2.0.0", optional = true, default-features = false }
upon = { version = "0.10.0", optional = true }
handlebars = { version = "6.4.2", optional = true }
serde_json = { version = "1", optional = true }
rustls = { version = "0.23", optional = true }
rustls-ring = { package = "rustls", version = "0.23", optional = true, default-features = false, features = ["ring", "std", "tls12"] }
rustls-aws = { package = "rustls", version = "0.23", optional = true, default-features = false, features = ["aws_lc_rs", "std", "tls12"] }
rustls-aws-fips = { package = "rustls", version = "0.23", optional = true, default-features = false, features = ["fips", "std", "tls12"] }
rustls-pki-types = { version = "1", optional = true }
rustls-webpki = { version = "0.103", optional = true, default-features = false, features = ["std"] }
rustls-loom-aws = { package = "rustls", version = "0.23", optional = true, default-features = false, features = ["aws_lc_rs", "std"] }
x509-parser = { version = "0.18", optional = true, default-features = false }
x509-cert = { version = "0.2", optional = true, default-features = false }
rcgen = { version = "0.14", optional = true }
tonic = { version = "*", optional = true, default-features = false, features = ["transport", "codegen"] }
prost = { version = "*", optional = true, features = ["derive"] }
openidconnect = { version = "4.0.1", optional = true }
openidconnect-core = { package = "openidconnect", version = "4.0.1", optional = true, default-features = false }
id_token_verifier = { version = "0.1.8", optional = true }
jsonwebtoken = { version = "10.4.0", optional = true }
jsonwebtoken-aws = { package = "jsonwebtoken", version = "10.4.0", optional = true, default-features = false, features = ["aws-lc-rs"] }
saml = { version = "0.0.1-alpha.0", optional = true }
rustauth-saml = { version = "0.3.0", optional = true }
rustauth-saml-signed = { package = "rustauth-saml", version = "0.3.0", optional = true, features = ["saml-signed", "sso-internal"] }
opensaml = { version = "0.1.4", optional = true }
opensaml-protocol = { package = "opensaml", version = "0.1.4", optional = true, default-features = false }
webauthn_rp = { version = "0.3.0", optional = true, features = ["serde_relaxed"] }
caden = { version = "0.7.0", optional = true }
passkey = { version = "0.5.0", optional = true }
webauthn-rs = { version = "0.6.1-dev", optional = true, default-features = false }
url = { version = "2", optional = true }
x509-parser-verify-ring = { package = "x509-parser", version = "0.18", optional = true, default-features = false, features = ["verify"] }
x509-parser-verify-aws = { package = "x509-parser", version = "0.18", optional = true, default-features = false, features = ["verify-aws"] }
x509-verify = { version = "0.4.8", optional = true }
ring = { version = "0.17.14", optional = true }
ed25519-dalek = { version = "3.0.0-rc.1", optional = true, default-features = false }
ed25519-signature = { package = "signature", version = "3.0.0-rc.4", optional = true }
p256 = { version = "0.14.0", optional = true }
rsa = { version = "0.10.0-rc.18", optional = true, default-features = false, features = ["sha2"] }
tokio = { version = "1", optional = true, features = ["rt", "rt-multi-thread", "time"] }
tokio-rustls = { version = "0.26", optional = true, default-features = false }
reqwest-rustls = { package = "reqwest", version = "0.12", optional = true, default-features = false, features = ["json", "stream", "rustls-tls"] }
hf-hub-default = { package = "hf-hub", version = "0.5", optional = true }
hf-hub-tokio-rustls = { package = "hf-hub", version = "0.5", optional = true, default-features = false, features = ["tokio", "rustls-tls"] }
hf-hub-ureq = { package = "hf-hub", version = "0.5", optional = true, default-features = false, features = ["ureq"] }
reqwest-rustls-blocking = { package = "reqwest", version = "0.12", optional = true, default-features = false, features = ["blocking", "rustls-tls"] }
genai-probe = { package = "genai", version = "0.7.0-beta.9", optional = true, default-features = false, features = ["rustls-tls"] }
ollama-rs-rustls = { package = "ollama-rs", version = "0.3.5", optional = true, default-features = false, features = ["rustls"] }
ollama-rs-stream = { package = "ollama-rs", version = "0.3.5", optional = true, default-features = false, features = ["rustls", "stream"] }
llama-cpp-2-common = { package = "llama-cpp-2", version = "0.1.150", optional = true, default-features = false, features = ["common"] }
llama-cpp-2-metal = { package = "llama-cpp-2", version = "0.1.150", optional = true, default-features = false, features = ["common", "metal"] }
mistralrs-probe = { package = "mistralrs", version = "0.8.1", optional = true }
apple-mlx-probe = { package = "apple-mlx", version = "0.1.1", optional = true }
llmfit-core-probe = { package = "llmfit-core", version = "0.9.38", optional = true }
sysinfo = { version = "*", optional = true }
systemstat = { version = "*", optional = true }
sys-info-probe = { package = "sys-info", version = "*", optional = true }
# rust-ipfs is measured as an embeddable node with its default IPFS behaviours. The direct Bitswap
# component has a separate detached probe because it is independently useful and separately resolved.
rust-ipfs = { version = "0.15.0", optional = true, default-features = false, features = ["ed25519"] }
# Arti is measured with Tokio, rustls, and the embedded onion-service server capability. No
# system Tor daemon or native TLS implementation is included in this profile.
arti-client = { version = "0.43.0", optional = true, default-features = false, features = ["tokio", "rustls", "onion-service-service"] }

[profile.release]
# Match a lean release so the comparison reflects code size, not debug info.
strip = true
lto = "thin"
codegen-units = 1
