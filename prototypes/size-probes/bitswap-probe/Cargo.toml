# Standalone direct-Bitswap footprint probe. It is detached from the parent workspace and from the
# sibling probe package so the direct protocol candidate is measured independently from a full node.
[workspace]

[package]
name = "bitswap-size-probe"
version = "0.0.0"
edition = "2021"
publish = false

[[bin]]
name = "bitswap-probe"
path = "main.rs"

[features]
baseline = []
bitswap = ["dep:anyhow", "dep:async-trait", "dep:cid", "dep:co-libp2p-bitswap", "dep:libp2p"]

[dependencies]
anyhow = { version = "1", optional = true }
async-trait = { version = "0.1", optional = true }
cid = { version = "0.11.2", optional = true }
co-libp2p-bitswap = { version = "0.27.0", optional = true, default-features = false }
libp2p = { version = "0.56", optional = true }

[profile.release]
strip = true
lto = "thin"
codegen-units = 1
