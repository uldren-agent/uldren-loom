# cargo-deny policy. Run with `just deny` / `cargo deny check`.
# Dependencies must be permissively licensed; the project's own crates are source-available
# (BUSL-1.1) and exempted below. MPL-2.0 is additionally allowed: it is file-level copyleft, safe to
# link into a source-available product (only modifications to MPL files must be shared), and it
# unblocks engines such as Cozo for the optional facet/AI-memory work.

[advisories]
version = 2
yanked = "deny"
ignore = [
    # bincode 1.3.3 is feature-complete and unmaintained by the maintainers' DELIBERATE choice (not a
    # security vulnerability) - see RUSTSEC-2025-0141. It is pulled only transitively by hnsw_rs (the
    # native ANN accelerator), and there is no safe upgrade. Revisit if hnsw_rs migrates off bincode.
    { id = "RUSTSEC-2025-0141", reason = "bincode 1.3.3 unmaintained-by-choice, transitive via hnsw_rs, no fix available" },
    # paste 1.0.15 is unmaintained (not a security vulnerability) and is currently an unconditional
    # transitive dependency of parquet 59.0.0 for the columnar Arrow/Parquet projection. parquet exposes
    # no feature switch to remove it, and the local dependency set has no safe upgrade. Revisit on the
    # next Arrow/Parquet bump or if the projection replaces the parquet crate.
    { id = "RUSTSEC-2024-0436", reason = "paste 1.0.15 unmaintained, unconditional transitive via parquet 59.0.0, no feature-level removal or safe upgrade available" },
    # rsa 0.9.10 Marvin timing side-channel (RUSTSEC-2023-0071). Upstream has NO safe upgrade ("No safe
    # upgrade is available"); a constant-time rewrite is in progress. Reachable only through the hosted
    # SAML/OIDC crypto stack (bergshamra/openidconnect -> rsa), never the compute/exec path, and the
    # attack requires observing RSA private-key operation timing over the network. Accept per upstream
    # guidance; drop this the moment a constant-time rsa releases.
    { id = "RUSTSEC-2023-0071", reason = "rsa 0.9.10 Marvin timing side-channel; no safe upgrade exists upstream; transitive only via the hosted SAML/OIDC stack" },
]

