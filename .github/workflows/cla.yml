name: CLA

# Requires a CLA before merging contributions (see CONTRIBUTING.md).
# Signatures are recorded in a separate private repo; set CLA_SIGNATURES_TOKEN as a secret.

on:
  issue_comment:
    types: [created]
  pull_request_target:
    types: [opened, closed, synchronize]

permissions:
  actions: write
  contents: read
  pull-requests: write
  statuses: write

jobs:
  cla:
    runs-on: ubuntu-latest
    steps:
      - uses: contributor-assistant/github-action@v2.6.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PERSONAL_ACCESS_TOKEN: ${{ secrets.CLA_SIGNATURES_TOKEN }}
        with:
          path-to-signatures: "signatures/version1/cla.json"
          path-to-document: "https://github.com/uldrenai/uldren-loom/blob/main/CONTRIBUTING.md#contributor-license-agreement"
          branch: main
          allowlist: dependabot[bot]
