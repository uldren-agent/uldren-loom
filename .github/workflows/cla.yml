name: CLA

# Requires a CLA before merging contributions (see CONTRIBUTING.md).
# Signatures are committed by the default GITHUB_TOKEN to the `cla-signatures` branch of this repo.
# That branch must exist and must NOT be covered by branch protection or a ruleset, otherwise the
# action cannot push to it and fails with "Resource not accessible by integration".

on:
  issue_comment:
    types: [created]
  pull_request_target:
    types: [opened, closed, synchronize]

permissions:
  actions: write
  contents: write
  pull-requests: write
  statuses: write

jobs:
  cla:
    runs-on: ubuntu-latest
    steps:
      - uses: contributor-assistant/github-action@v2.6.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          path-to-signatures: "signatures/version1/cla.json"
          path-to-document: "https://github.com/uldrenai/uldren-loom/blob/main/CONTRIBUTING.md#contributor-license-agreement"
          branch: cla-signatures
          allowlist: dependabot[bot],uldren-loom[bot]
