[package]
authors.workspace = true
description = "RemoteLoomClient: the Loom Remote Protocol client over a pluggable transport."
edition.workspace = true
license.workspace = true
name = "uldren-loom-remote-client"
repository.workspace = true
rust-version.workspace = true
version.workspace = true

[lib]
name = "loom_remote_client"

[lints]
workspace = true

[features]
default = []
# The concrete HTTP/2-over-TLS transport (0067 section 6). Off by default so engine-free / sandboxed
# packages can link the protocol client without pulling hyper/tokio/rustls.
carrier = [
    "dep:http-body-util",
    "dep:hyper",
    "dep:hyper-util",
    "dep:rustls",
    "dep:tokio",
    "dep:tokio-rustls",
]

[dependencies]
futures-core = { workspace = true }
loom-codec.workspace = true
loom-locator.workspace = true
loom-remote-protocol.workspace = true
loom-result.workspace = true
loom-types.workspace = true
http-body-util = { version = "0.1.4", default-features = false, optional = true }
hyper = { version = "1", default-features = false, features = ["client", "http2"], optional = true }
hyper-util = { version = "0.1", default-features = false, features = ["tokio"], optional = true }
rustls = { version = "0.23", default-features = false, features = ["aws_lc_rs", "std"], optional = true }
tokio = { version = "1", default-features = false, features = ["net", "rt", "sync"], optional = true }
tokio-rustls = { version = "0.26", default-features = false, optional = true }

[dev-dependencies]
loom-client.workspace = true
loom-core.workspace = true
loom-hosted-core = { workspace = true, features = ["http", "tls"] }
loom-store.workspace = true
loom-tickets.workspace = true
futures = "0.3"
rcgen = "0.14"
rustls = { version = "0.23", default-features = false, features = ["aws_lc_rs", "std"] }
serde_json.workspace = true
tokio = { version = "1", default-features = false, features = ["macros", "rt", "rt-multi-thread", "net"] }
tokio-rustls = { version = "0.26", default-features = false, features = ["aws_lc_rs"] }
