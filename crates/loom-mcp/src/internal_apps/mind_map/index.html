<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Mind Map</title>
  <style>
    {{ loom.app_shell.css }}

    main {
      display: grid;
      grid-template-rows: auto auto minmax(360px, 1fr);
      min-height: 100vh;
    }

    header {
      border-bottom: 1px solid var(--line);
      background: var(--panel);
      padding: 18px 20px;
    }

    h1 {
      margin: 0;
      font-size: 18px;
      letter-spacing: 0;
    }

    .meta {
      color: var(--muted);
      font-size: 13px;
      margin-top: 4px;
    }

    .controls {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 12px;
      padding: 14px 20px;
      border-bottom: 1px solid var(--line);
      background: var(--bg);
    }

    form {
      display: grid;
      gap: 8px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      padding: 12px;
    }

    form strong {
      font-size: 13px;
    }

    input {
      min-width: 0;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: var(--bg);
      color: var(--ink);
      padding: 7px 9px;
      font: inherit;
    }

    button {
      min-height: 32px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: var(--accent);
      color: var(--accent-ink);
      font: inherit;
      cursor: pointer;
    }

    .action-status {
      color: var(--muted);
      font-size: 13px;
      padding: 0 20px 12px;
    }

    .canvas {
      position: relative;
      min-height: 360px;
      overflow: hidden;
    }

    svg {
      display: block;
      width: 100%;
      height: 100%;
      min-height: 360px;
    }

    .edge {
      stroke: var(--muted);
      stroke-width: 1.5;
      opacity: 0.7;
    }

    .node circle {
      fill: var(--panel);
      stroke: var(--accent);
      stroke-width: 2;
    }

    .node text {
      fill: var(--ink);
      font-size: 12px;
      dominant-baseline: middle;
      text-anchor: middle;
      pointer-events: none;
    }

    .empty {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      color: var(--muted);
      text-align: center;
      padding: 32px;
    }

    @media (max-width: 860px) {
      .controls {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <main>
    <header>
      <h1>Mind Map</h1>
      <div class="meta" id="summary">Loading structure</div>
    </header>
    <section class="controls" aria-label="Structure actions">
      <form id="add-node">
        <strong>Add node</strong>
        <input name="node_id" placeholder="node id" required>
        <input name="label" placeholder="label" required>
        <input name="kind" placeholder="kind" value="topic" required>
        <input name="entity_ref" placeholder="entity ref">
        <button type="submit">Add</button>
      </form>
      <form id="move-node">
        <strong>Move node</strong>
        <input name="node_id" placeholder="node id" required>
        <input name="parent_node_id" placeholder="parent node id">
        <input name="label" placeholder="label override">
        <button type="submit">Move</button>
      </form>
      <form id="link-node">
        <strong>Link nodes</strong>
        <input name="edge_id" placeholder="edge id" required>
        <input name="src_node_id" placeholder="source node id" required>
        <input name="dst_node_id" placeholder="destination node id" required>
        <input name="label" placeholder="label" value="relates" required>
        <button type="submit">Link</button>
      </form>
    </section>
    <div class="action-status" id="action-status"></div>
    <section class="canvas" aria-label="Mind map canvas">
      <svg id="map" role="img" aria-label="Mind map"></svg>
      <div class="empty" id="empty">No structure selected.</div>
    </section>
  </main>
  <script>
    const data = {{ loom.pages | tojson }};
    const structure = data.structure ?? { nodes: [], edges: [], structure: {} };
    const nodes = Array.isArray(structure.nodes) ? structure.nodes : [];
    const edges = Array.isArray(structure.edges) ? structure.edges : [];
    const workspace = data.workspace?.name ?? data.profile_id ?? "workspace";
    const appUri = data.app_uri ?? data.definition?.resource_uri ?? "";
    const svg = document.getElementById("map");
    const width = 960;
    const height = 560;
    const cx = width / 2;
    const cy = height / 2;
    const radius = Math.min(width, height) * 0.34;
    svg.setAttribute("viewBox", `0 0 ${width} ${height}`);
    document.getElementById("summary").textContent =
      structure.structure?.title ?? data.definition?.display_name ?? "Mind Map";
    document.getElementById("empty").hidden = nodes.length > 0;
    const positions = new Map();
    nodes.forEach((node, index) => {
      const angle = nodes.length <= 1 ? -Math.PI / 2 : (Math.PI * 2 * index) / nodes.length - Math.PI / 2;
      positions.set(node.node_id, {
        x: cx + Math.cos(angle) * radius,
        y: cy + Math.sin(angle) * radius
      });
    });
    for (const edge of edges) {
      const from = positions.get(edge.src_node_id);
      const to = positions.get(edge.dst_node_id);
      if (!from || !to) continue;
      const line = document.createElementNS("http://www.w3.org/2000/svg", "line");
      line.setAttribute("class", "edge");
      line.setAttribute("x1", from.x);
      line.setAttribute("y1", from.y);
      line.setAttribute("x2", to.x);
      line.setAttribute("y2", to.y);
      svg.append(line);
    }
    for (const node of nodes) {
      const pos = positions.get(node.node_id);
      const group = document.createElementNS("http://www.w3.org/2000/svg", "g");
      group.setAttribute("class", "node");
      group.setAttribute("transform", `translate(${pos.x} ${pos.y})`);
      const circle = document.createElementNS("http://www.w3.org/2000/svg", "circle");
      circle.setAttribute("r", 36);
      const label = document.createElementNS("http://www.w3.org/2000/svg", "text");
      label.textContent = node.label ?? node.node_id;
      group.append(circle, label);
      svg.append(group);
    }
    const actionStatus = document.getElementById("action-status");

    function postHost(message) {
      const host = window.parent;
      if (!host || host === window) return;
      try {
        host.postMessage(Object.assign({ jsonrpc: "2.0" }, message), "*");
      } catch (_) {
      }
    }

    let requestId = 0;
    const pending = new Map();
    function request(method, params) {
      return new Promise((resolve, reject) => {
        const id = "loom-pages-structure-req-" + (++requestId);
        pending.set(id, { resolve, reject });
        postHost({ id, method, params: params || {} });
        setTimeout(() => {
          if (pending.has(id)) {
            pending.delete(id);
            reject(new Error("timeout waiting for " + method));
          }
        }, 15000);
      });
    }

    window.addEventListener("message", (event) => {
      const payload = event && event.data;
      if (!payload || payload.jsonrpc !== "2.0") return;
      if (payload.id !== undefined && pending.has(payload.id)) {
        const p = pending.get(payload.id);
        pending.delete(payload.id);
        if ("error" in payload) p.reject(payload.error);
        else p.resolve(payload.result);
      }
    });

    function clean(args) {
      for (const key of Object.keys(args)) {
        if (args[key] === "") delete args[key];
      }
      return args;
    }

    async function callStructureTool(tool, args) {
      if (!structure.structure?.structure_id) throw new Error("no structure selected");
      actionStatus.textContent = "Saving...";
      await request("tools/call", {
        name: "apps_call_tool",
        arguments: {
          app_uri: appUri,
          tool,
          arguments: clean(Object.assign({
            workspace,
            structure_id: structure.structure.structure_id,
            expected_root: structure.structure.profile_root
          }, args))
        }
      });
      actionStatus.textContent = "Saved";
      location.reload();
    }

    document.getElementById("add-node").addEventListener("submit", (event) => {
      event.preventDefault();
      callStructureTool("structures_add_node", Object.fromEntries(new FormData(event.currentTarget).entries()))
        .catch((e) => { actionStatus.textContent = "Save failed: " + ((e && e.message) || e); });
    });
    document.getElementById("move-node").addEventListener("submit", (event) => {
      event.preventDefault();
      callStructureTool("structures_move_node", Object.fromEntries(new FormData(event.currentTarget).entries()))
        .catch((e) => { actionStatus.textContent = "Save failed: " + ((e && e.message) || e); });
    });
    document.getElementById("link-node").addEventListener("submit", (event) => {
      event.preventDefault();
      callStructureTool("structures_link_node", Object.fromEntries(new FormData(event.currentTarget).entries()))
        .catch((e) => { actionStatus.textContent = "Save failed: " + ((e && e.message) || e); });
    });
  </script>
</body>
</html>
