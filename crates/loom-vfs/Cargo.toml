# Portable filesystem-projection layer for Uldren Loom. Maps a generic inode/callback filesystem
# surface onto the loom `fs` working-tree ops, so platform backends (FUSE, NFSv3, ...) are thin
# adapters over this one mapping. wasm32-clean: no native filesystem dependencies live here.
