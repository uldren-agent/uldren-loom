[package]
authors.workspace = true
description = "Protocol-level conformance runners for Uldren Loom hosted and MCP surfaces."
edition.workspace = true
license.workspace = true
name = "uldren-loom-protocol-conformance"
repository.workspace = true
rust-version.workspace = true
version.workspace = true

[features]
integration-tests = ["loom-mcp/integration-tests"]

[dependencies]
axum = { version = "0.8", default-features = false, features = ["http1", "tokio"] }
loom-client.workspace = true
loom-core.workspace = true
loom-hosted = { workspace = true, features = ["grpc", "http"] }
loom-lanes.workspace = true
loom-mcp = { workspace = true, features = ["server"] }
loom-store.workspace = true
loom-substrate = { workspace = true, features = ["studio-meetings"] }
loom-wire.workspace = true
serde_json.workspace = true
tokio = { workspace = true, features = ["rt", "rt-multi-thread"] }
tokio-stream = { version = "0.1", default-features = false }
tonic = { version = "0.14", default-features = false, features = ["codegen"] }
tower = { version = "0.5", default-features = false, features = ["util"] }

[lints]
workspace = true
